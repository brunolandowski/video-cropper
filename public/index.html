<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Video Cropper</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<h2>🎬 Video Cropper</h2>

<div id="dropZone" class="drop-zone">
  <p>Glisse ta vidéo ici ou clique</p>
  <input type="file" id="videoInput" hidden>
</div>

<br>

<select id="ratioSelect">
  <option value="">Ratio libre</option>
  <option value="16/9">16:9</option>
  <option value="4/5">4:5</option>
  <option value="4/3">4:3</option>
  <option value="1/1">1:1</option>
  <option value="9/16">9:16</option>
</select>

<br><br>

<div class="layout">

  <div class="container">
    <video id="video" controls></video>
    <div id="cropBox"></div>
  </div>

  <div class="preview">
    <div id="previewFrame" class="preview-frame">
      <video id="previewVideo" muted autoplay loop></video>
    </div>
    <p>Preview</p>
  </div>

</div>

<button onclick="crop()">Export</button>

<div id="progressContainer" style="display:none;">
  <div class="progress-bg">
    <div id="progressBar"></div>
  </div>
  <p id="progressText">0%</p>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
