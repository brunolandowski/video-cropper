<!DOCTYPE html>
<html>
<head>
  <title>Video Cropper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<h2>🎬 Video Cropper</h2>

<input type="file" id="videoInput"><br><br>

<select id="ratioSelect">
  <option value="">Ratio libre</option>
  <option value="16/9">16:9</option>
  <option value="4/5">4:5</option>
  <option value="4/3">4:3</option>
  <option value="1/1">1:1</option>
  <option value="9/16">9:16</option>
</select>

<br><br>

<div class="container">
  <video id="video" controls></video>
  <div id="cropBox"></div>
</div>

<div class="controls">
  <input type="number" id="x" placeholder="X">
  <input type="number" id="y" placeholder="Y">
  <input type="number" id="w" placeholder="W">
  <input type="number" id="h" placeholder="H">
</div>

<button onclick="crop()">Export</button>

<div id="progressContainer" style="display:none;">
  <div style="width:100%; height:10px; background:rgba(255,255,255,0.5); border-radius:10px;">
    <div id="progressBar" style="width:0%"></div>
  </div>
  <p id="progressText">0%</p>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
